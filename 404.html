<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Verbio Labs</title>
<meta name="description" content="Page not found.">
<meta name="google-site-verification" content="ioBjzhv06eTXi17PWtw1yiLCnnKuatJo3YFflHS4nDY" />
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<meta name="theme-color" content="#1d1d1f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --apple-black: #1d1d1f;
    --apple-gray-text: #424245;
    --apple-gray-text-light: #6e6e73;
    --apple-gray-line: #d2d2d7;
    --apple-blue: #0071e3;
    --font-en: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: "Instrument Serif", Georgia, serif;
    --font-kr: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-en);
    color: var(--apple-black);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    word-break: keep-all;
  }
  .wrap { max-width: 520px; }
  .eyebrow {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--apple-gray-text-light);
    margin-bottom: 20px;
  }
  .num {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(120px, 20vw, 200px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--apple-black);
    margin-bottom: 24px;
  }
  h1 {
    font-family: var(--font-en);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--apple-black);
    margin-bottom: 12px;
  }
  p {
    font-family: var(--font-kr);
    color: var(--apple-gray-text);
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    background: var(--apple-black);
    color: white;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    text-decoration: none;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
  }
  .btn:hover { transform: translateY(-1px); background: #2d2d31; }
  .btn::after { content: "›"; font-size: 18px; line-height: 1; }
  :focus-visible { outline: 2px solid var(--apple-blue); outline-offset: 3px; border-radius: 4px; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Verbio Labs</div>
    <div class="num">404</div>
    <h1>Page not found</h1>
    <p>찾으시는 페이지가 존재하지 않거나 옮겨졌습니다.<br>홈으로 돌아가서 다시 시도해 주세요.</p>
    <a href="/" class="btn">메인으로</a>
  </main>
</body>
</html>
